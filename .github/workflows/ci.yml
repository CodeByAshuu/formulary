name: CI — Lint & Build

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ─────────────────────────────────────────────────────────────
  #  Backend: install & lint
  # ─────────────────────────────────────────────────────────────
  server-ci:
    name: Server — Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: healthcare_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # No test suite yet — verify the app can at least start
      - name: Smoke-test server startup
        env:
          PORT: 5000
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: healthcare_db_test
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci_test_secret
          ADMIN_EMAIL: admin@formulary.com
          ADMIN_PASSWORD: admin123
        run: |
          timeout 10 node src/index.js &
          sleep 5
          curl --fail http://localhost:5000/ || exit 1
          kill %1 || true

  # ─────────────────────────────────────────────────────────────
  #  Frontend: install, lint, build
  # ─────────────────────────────────────────────────────────────
  client-ci:
    name: Client — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_URL: http://localhost:5000
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 3
